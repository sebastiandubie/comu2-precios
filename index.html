<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f1;color:#1a1a1a;padding:24px}
.hdr{padding:0 0 1rem;border-bottom:1px solid #e0dfd8;margin-bottom:1.25rem;display:flex;justify-content:space-between;align-items:flex-end}
.hdr h1{font-size:22px;font-weight:500;letter-spacing:-.3px}
.hdr p{font-size:12px;color:#666;margin-top:3px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.sc{background:#fff;border-radius:8px;padding:.7rem 1rem;border:1px solid #e8e7e0}
.sc-l{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.sc-v{font-size:20px;font-weight:500}
.sc-s{font-size:10px;color:#888;margin-top:1px}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1.25rem}
.fl{font-size:11px;color:#666}
.fb{font-size:11px;padding:4px 12px;border-radius:100px;border:1px solid #ccc;background:#fff;color:#555;cursor:pointer}
.fb:hover{background:#f0efea}
.fb.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.uc{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:1rem;cursor:pointer;border-left:3px solid #e0dfd8}
.uc:hover{border-color:#999}
.uc.disp{border-left-color:#1D9E75}
.uc.vend{opacity:.4}
.uc.res{border-left-color:#EF9F27}
.uh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.uid{font-size:17px;font-weight:500}
.utipo{font-size:10px;color:#666;background:#f0efea;padding:2px 8px;border-radius:100px}
.ubadge{font-size:9px;font-weight:600;padding:2px 8px;border-radius:100px;display:inline-block;margin-bottom:6px}
.bd{background:#EAF3DE;color:#3B6D11}.bv{background:#f0efea;color:#888}.br{background:#FAEEDA;color:#854F0B}
.uprice{font-size:17px;font-weight:500;margin:4px 0 1px}
.um2{font-size:11px;color:#666}
.umeta{display:flex;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid #f0efea}
.umi{font-size:10px;color:#888}
.umi span{font-weight:500;color:#1a1a1a;display:block;font-size:11px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mhdr{display:flex;justify-content:space-between;align-items:flex-start;padding:1.25rem 1.5rem 1rem;border-bottom:1px solid #f0efea}
.mttl{font-size:18px;font-weight:500}
.msub{font-size:12px;color:#888;margin-top:2px}
.mclose{font-size:24px;cursor:pointer;color:#999;line-height:1}
.mbody{padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1rem}
.plan-lbl{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.plan-wrap{position:relative;border-radius:8px;overflow:hidden;border:1px solid #e0dfd8}
.plan-wrap img{display:block;width:100%;height:auto}
.plan-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.pbox{background:#f5f4f1;border-radius:8px;padding:.9rem 1rem;text-align:center}
.pbox-l{font-size:11px;color:#888;margin-bottom:3px}
.pbox-v{font-size:24px;font-weight:500}
.pbox-s{font-size:11px;color:#888;margin-top:2px}
.drow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f4f1;font-size:13px}
.drow:last-child{border:none}
.drl{color:#888}.drv{font-weight:500}
.dsec{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin:10px 0 4px}
.spinner{display:flex;align-items:center;gap:10px;padding:2rem;color:#888;font-size:13px}
.spinner:before{content:'';width:18px;height:18px;border:2px solid #e0dfd8;border-top-color:#1a1a1a;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

function numFmt(n) { return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
function fmt(n) { return n > 0 ? "USD " + numFmt(n) : "-"; }
function fmtM2(n) { return n > 0 ? "USD " + numFmt(n) + "/m²" : "-"; }
function clean(s) { return (s||"").toString().trim(); }
function numVal(s) { return parseFloat(clean(s).replace(/[^0-9.-]/g,"")) || 0; }

function getPlanKey(dto, piso) {
  var p = parseInt(piso)||0, d = dto.toUpperCase();
  if (p>=1&&p<=4) return "p1-4";
  if (p===5||p===6) return "p5";
  if (p===7) return d.indexOf("B")!==-1?"p7b":"p7";
  if (p===8) return d.indexOf("B")!==-1?"p8b":"p8";
  if (p===9) return "az";
  return "p1-4";
}
function getUnitKey(dto, piso) {
  var p = parseInt(piso)||0, d = dto.toUpperCase().trim();
  if (p>=1&&p<=4) { var m=d.match(/-0?(\d)$/); return m?"UF-X-0"+m[1]:"UF-X-01"; }
  if (p===5||p===6) return d;
  if (p===7) return d.indexOf("B")!==-1?"UF-07-01B":"UF-07-01";
  if (p===8) return d.indexOf("B")!==-1?"UF-08-01B":"UF-08-01";
  return "UF-09-01";
}

        m2semi: numVal(v(row,C.m2semi)),
        orient: clean(v(row,C.orient)),
        vista: clean(v(row,C.vista)),
        lista: lista,
        m2lista: numVal(v(row,C.m2lista)),
        estado: estado,
        anticipo: numVal(v(row,C.anticipo)),
        cuotas: numVal(v(row,C.cuotas)),
        planKey: getPlanKey(dto,piso),
        unitKey: getUnitKey(dto,piso)
      });
    }

    if (!units.length) {
      showError("El sheet cargó pero no se encontraron unidades DPTO. Verificá que la hoja correcta esté publicada.");
      return;
    }
    document.getElementById("loading").style.display = "none";
    document.getElementById("main").style.display = "block";
    updateStats();
    render();
  } catch(e) {
    showError("Error procesando datos: " + e.message);
  }
}

function showError(msg) {
  document.getElementById("loading").innerHTML =
    "<div style=\"color:#a00;font-size:13px;padding:1rem;background:#fff3f3;border-radius:8px;border:1px solid #fcc\">\u26a0\ufe0f " + msg + "</div>";
}

function sf(k,v,btn) {
  filt[k]=v;
  var btns=document.querySelectorAll(".fb");
  for (var i=0;i<btns.length;i++) {
    var oc=btns[i].getAttribute("onclick")||"";
    if (oc.indexOf('sf(&quot;'+k+'&quot;')!==-1) btns[i].classList.remove("active");
  }
  btn.classList.add("active"); render();
}
function stCls(e){return e==="DISPONIBLE"?"disp":e==="VENDIDO"?"vend":"res";}
function stBadge(e){
  var m={DISPONIBLE:["bd","Disponible"],VENDIDO:["bv","Vendido"],RESERVADO:["br","Reservado"]};
  var x=m[e]||["bv",e];
  return "<span class=\"ubadge "+x[0]+"\">"+x[1]+"</span>";
}
function updateStats() {
  var disp=units.filter(function(u){return u.estado==="DISPONIBLE";});
  var vend=units.filter(function(u){return u.estado==="VENDIDO";});
  var avgM2=disp.length?Math.round(disp.reduce(function(s,u){return s+u.m2lista;},0)/disp.length):0;
  var totalM2=Math.round(disp.reduce(function(s,u){return s+u.m2tot;},0));
  document.getElementById("stats").innerHTML=
    "<div class=\"sc\"><div class=\"sc-l\">Disponibles</div><div class=\"sc-v\">"+disp.length+"</div><div class=\"sc-s\">de "+units.length+" unidades</div></div>"+
    "<div class=\"sc\"><div class=\"sc-l\">Vendidas</div><div class=\"sc-v\">"+vend.length+"</div><div class=\"sc-s\">&mdash;</div></div>"+
    "<div class=\"sc\"><div class=\"sc-l\">m² disponibles</div><div class=\"sc-v\">"+numFmt(totalM2)+"</div><div class=\"sc-s\">m²</div></div>"+
    "<div class=\"sc\"><div class=\"sc-l\">Precio m² prom.</div><div class=\"sc-v\">USD "+numFmt(avgM2)+"</div><div class=\"sc-s\">disponibles</div></div>";
}
function render() {
  var data=units.filter(function(u){
    if(filt.tipo!=="all"&&u.tipo!==filt.tipo)return false;
    if(filt.estado!=="all"&&u.estado!==filt.estado)return false;
    return true;
  });
  var grid=document.getElementById("grid");
  if(!data.length){grid.innerHTML="<p style=\"color:#999;padding:2rem\">No hay unidades.</p>";return;}
  var html="";
  for(var i=0;i<data.length;i++){
    var u=data[i];
    html+="<div class=\"uc "+stCls(u.estado)+"\" onclick=\"openM('"+u.id+"')\">"+
      "<div class=\"uh\"><div class=\"uid\">Dpto "+u.dto+"</div><div class=\"utipo\">"+u.tipo+"</div></div>"+
      stBadge(u.estado)+
      "<div class=\"uprice\">"+fmt(u.lista)+"</div>"+
      "<div class=\"um2\">"+fmtM2(u.m2lista)+" &middot; Piso "+u.piso+"</div>"+
      "<div class=\"umeta\">"+
        "<div class=\"umi\"><span>"+u.m2tot.toFixed(1)+" m²</span>Total</div>"+
        "<div class=\"umi\"><span>"+u.m2cub.toFixed(1)+" m²</span>Cubiertos</div>"+
        "<div class=\"umi\"><span>"+u.orient+"</span>Orient.</div>"+
      "</div></div>";
  }
  grid.innerHTML=html;
}
function openM(id){
  var u=null;
  for(var i=0;i<units.length;i++){if(units[i].id===id){u=units[i];break;}}
  if(!u)return;
  document.getElementById("m-title").textContent="Departamento "+u.dto;
  document.getElementById("m-sub").textContent=u.tipo+" · Piso "+u.piso+" · "+u.estado;
  document.getElementById("plan-lbl").textContent=PLAN_LABELS[u.planKey]||"Planta";
  document.getElementById("plan-img").src=PLAN_SRC[u.planKey]||"";
  var dims=PLAN_DIMS[u.planKey]||{w:600,h:354};
  var svg=document.getElementById("plan-svg");
  svg.setAttribute("viewBox","0 0 "+dims.w+" "+dims.h);
  var coords=(HIGHLIGHTS[u.planKey]||{})[u.unitKey];
  var s="";
  if(coords){
    var x1=coords[0]/100*dims.w,y1=coords[1]/100*dims.h;
    var x2=coords[2]/100*dims.w,y2=coords[3]/100*dims.h;
    var W=x2-x1,H=y2-y1,cx=x1+W/2,cy=y1+H/2;
    s+="<rect x=\"0\" y=\"0\" width=\""+dims.w+"\" height=\""+dims.h+"\" fill=\"rgba(0,0,0,0.18)\"/>";
    s+="<rect x=\""+x1+"\" y=\""+y1+"\" width=\""+W+"\" height=\""+H+"\" fill=\"rgba(29,158,117,0.22)\" stroke=\"#1D9E75\" stroke-width=\"4\" rx=\"3\"/>";
    s+="<rect x=\"+"+(cx-54)+"\" y=\"+"+(cy-14)+"\" width=\"108\" height=\"26\" rx=\"5\" fill=\"#1D9E75\"/>";
    s+="<text x=\""+cx+"\" y=\"+"+(cy+5)+"\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"600\" fill=\"white\" font-family=\"Arial,sans-serif\">"+u.dto+"</text>";
  }
  svg.innerHTML=s;
  document.getElementById("m-pbox").innerHTML=
    "<div class=\"pbox-l\">Precio de lista</div>"+
    "<div class=\"pbox-v\">"+fmt(u.lista)+"</div>"+
    "<div class=\"pbox-s\">"+fmtM2(u.m2lista)+"</div>";
  var det="<div class=\"dsec\">Superficies</div>"+
    "<div class=\"drow\"><span class=\"drl\">Cubiertos</span><span class=\"drv\">"+u.m2cub.toFixed(2)+" m²</span></div>";
  if(u.m2semi>0) det+="<div class=\"drow\"><span class=\"drl\">Semicubiertos / terraza</span><span class=\"drv\">"+u.m2semi.toFixed(2)+" m²</span></div>";
  det+="<div class=\"drow\"><span class=\"drl\">Total</span><span class=\"drv\">"+u.m2tot.toFixed(2)+" m²</span></div>"+
    "<div class=\"dsec\">Ubicación</div>"+
    "<div class=\"drow\"><span class=\"drl\">Orientación</span><span class=\"drv\">"+u.orient+"</span></div>"+
    "<div class=\"drow\"><span class=\"drl\">Vista</span><span class=\"drv\">"+u.vista+"</span></div>"+
    "<div class=\"dsec\">Financiación</div>"+
    "<div class=\"drow\"><span class=\"drl\">Anticipo 30%</span><span class=\"drv\">"+fmt(u.anticipo)+"</span></div>"+
    "<div class=\"drow\"><span class=\"drl\">Cuota estimada</span><span class=\"drv\">"+fmt(u.cuotas)+" / mes</span></div>";
  document.getElementById("m-det").innerHTML=det;
  document.getElementById("overlay").classList.add("open");
}
function closeM(){document.getElementById("overlay").classList.remove("open");}

// fetch directo — funciona desde HTTPS (GitHub Pages)
var CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQVidy0p_Z2NKVCxT75IPlWDPgoK8pDLmCetRAyCkjaRm9CuKvXSM_jD7w_aGKhmz4j9_N84lJOfUzX/pub?gid=1295461305&single=true&output=csv";

function parseCSV(text) {
  var rows=[], lines=text.split("\n"), i, j, row, cell, inQ, ch;
  for(i=0;i<lines.length;i++){
    row=[];cell="";inQ=false;
    for(j=0;j<lines[i].length;j++){
      ch=lines[i][j];
      if(ch==='"'&&!inQ){inQ=true;}
      else if(ch==='"'&&inQ){if(lines[i][j+1]==='"'){cell+='"';j++;}else{inQ=false;}}
      else if(ch===','&&!inQ){row.push(cell.trim());cell="";}
      else{cell+=ch;}
    }
    row.push(cell.trim());
    rows.push(row);
  }
  return rows;
}

function parseUnits(rows) {
  var headerIdx=-1,i,j;
  for(i=0;i<rows.length;i++){
    for(j=0;j<rows[i].length;j++){
      if(rows[i][j].toUpperCase().replace(/[^A-Z]/g,"").indexOf("DESCRIPCI")===0){headerIdx=i;break;}
    }
    if(headerIdx!==-1)break;
  }
  if(headerIdx===-1)return[];
  var headers=rows[headerIdx];
  function findCol(names){
    for(var n=0;n<names.length;n++){
      var t=names[n].toUpperCase().replace(/[^A-Z0-9]/g,"");
      for(var c=0;c<headers.length;c++){
        var h=headers[c].toUpperCase().replace(/[^A-Z0-9]/g,"");
        if(h===t||h.indexOf(t)===0)return c;
      }
    }
    return -1;
  }
  var C={
    desc:findCol(["DESCRIPCIÓN","DESCRIPCION"]),
    piso:findCol(["PISO"]),dto:findCol(["DTO"]),
    tipo:findCol(["TIPOLOGÍA","TIPOLOGIA"]),
    m2cub:findCol(["CUBIERTO"]),m2semi:findCol(["SEMICUBIERTO"]),
    m2tot:findCol(["TOTAL"]),orient:findCol(["ORIENTACION"]),
    vista:findCol(["VISTA"]),lista:findCol(["PRECIODELISTA","LISTADEPRECIOSETAPA"]),
    m2lista:findCol(["VALORM2"]),estado:findCol(["ESTADO"]),
    anticipo:findCol(["ANTICIPO"]),cuotas:findCol(["CUOTAS","30CUOTAS"])
  };
  if(C.m2tot===-1)C.m2tot=9;if(C.lista===-1)C.lista=20;
  if(C.m2lista===-1)C.m2lista=19;if(C.estado===-1)C.estado=30;
  if(C.anticipo===-1)C.anticipo=25;if(C.cuotas===-1)C.cuotas=26;
  var result=[];
  for(i=headerIdx+1;i<rows.length;i++){
    var row=rows[i];
    if(!row||row.length<4)continue;
    var desc=(row[C.desc]||"").toString().trim().toUpperCase();
    if(desc!=="DPTO")continue;
    var dto=(row[C.dto]||"").toString().trim();
    var piso=(row[C.piso]||"").toString().trim();
    var lista=parseFloat((row[C.lista]||"").replace(/[^0-9.-]/g,""))||0;
    if(!dto||lista<=0)continue;
    var tipo=(row[C.tipo]||"").toString().trim().toUpperCase();
    var estado=(row[C.estado]||"DISPONIBLE").toString().trim().toUpperCase();
    result.push({
      id:dto.replace(/\s+/g,"_"),piso:parseInt(piso)||0,dto:dto,tipo:tipo,
      m2tot:parseFloat(row[C.m2tot])||0,m2cub:parseFloat(row[C.m2cub])||0,
      m2semi:parseFloat(row[C.m2semi])||0,
      orient:(row[C.orient]||"").toString().trim(),
      vista:(row[C.vista]||"").toString().trim(),
      lista:lista,m2lista:parseFloat((row[C.m2lista]||"").replace(/[^0-9.-]/g,""))||0,
      estado:estado,
      anticipo:parseFloat((row[C.anticipo]||"").replace(/[^0-9.-]/g,""))||0,
      cuotas:parseFloat((row[C.cuotas]||"").replace(/[^0-9.-]/g,""))||0,
      planKey:getPlanKey(dto,piso),unitKey:getUnitKey(dto,piso)
    });
  }
  return result;
}

function loadData() {
  fetch(CSV_URL)
    .then(function(r){
      if(!r.ok)throw new Error("HTTP "+r.status);
      return r.text();
    })
    .then(function(text){
      var rows=parseCSV(text);
      units=parseUnits(rows);
      if(!units.length){
        showError("El sheet cargó pero no se encontraron unidades. Verificá que la hoja correcta esté publicada.");
        return;
      }
      document.getElementById("loading").style.display="none";
      document.getElementById("main").style.display="block";
      updateStats();render();
    })
    .catch(function(err){
      showError("No se pudo cargar: "+err.message);
    });
}

loadData();
